# Netlify Configuration for Old Oak Town

[build]
  publish = "."
  functions = "netlify/functions"

# Environment variables (set these in Netlify dashboard or use .env file locally)
# STRIPE_SECRET_KEY - Your Stripe secret key
# SMTP_HOST - SMTP server host
# SMTP_PORT - SMTP server port
# SMTP_USER - SMTP username
# SMTP_PASS - SMTP password
# SMTP_FROM - From email address
# ADMIN_EMAIL - Admin email to receive notifications

# ── Admin HTTP Basic Auth (Netlify Pro / Business plan required) ──────────────
# Uncomment this block and set ADMIN_BASIC_AUTH in Netlify dashboard env vars
# to add a second layer of auth in front of /admin/* at the CDN edge.
# Format for ADMIN_BASIC_AUTH:  username:password
# [[redirects]]
#   from = "/admin/*"
#   to = "/admin/:splat"
#   status = 200
#   force = true
#   [redirects.headers]
#     Basic-Auth = "oldoak:{ADMIN_BASIC_AUTH}"

# Redirect rules
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
