name: Daily News Ticker Update

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 7am UTC
  workflow_dispatch:       # Allow manual runs from GitHub Actions UI

jobs:
  update-ticker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts --omit=dev

      - name: Update ticker news
        run: node scripts/update-ticker.js

      - name: Commit updated ticker data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ticker-news.json
          if git diff --cached --quiet; then
            echo "No changes to ticker data."
          else
            git commit -m "chore: update daily news ticker [skip ci]"
            git push
          fi
