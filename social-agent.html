<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Old Oak Town — Social Command Centre</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

:root {
  --ink: #0F1A0A;
  --green-deep: #1C3A0E;
  --green-mid: #2F6020;
  --green-bright: #4C8A35;
  --green-pale: #D4E8C8;
  --green-ghost: #F0F7EB;
  --amber: #D4860A;
  --amber-pale: #FEF3DC;
  --red: #C0392B;
  --red-pale: #FDECEA;
  --blue: #1A5CB8;
  --blue-pale: #E8F0FC;
  --cream: #FAF8F4;
  --white: #FFFFFF;
  --border: #DDE8D4;
  --muted: #6B7B5E;
  --fb: #1877F2;
  --ig: #C13584;
  --li: #0A66C2;
  --make: #6D00CC;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
}

/* ── HEADER ── */
.header {
  background: var(--green-deep);
  padding: 0 28px;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 20px;
  height: 62px;
  position: sticky;
  top: 0;
  z-index: 200;
  border-bottom: 2px solid var(--green-bright);
}

.brand { display: flex; align-items: center; gap: 11px; }

.brand-icon {
  width: 34px; height: 34px;
  background: var(--green-bright);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-size: 19px; color: white; font-style: italic;
}

.brand-name { font-family: 'Instrument Serif', serif; font-size: 19px; color: white; line-height: 1; }
.brand-sub { font-size: 10px; color: var(--green-pale); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }

.pipeline-steps {
  display: flex; align-items: center; gap: 0; justify-content: center;
}

.step {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 14px;
  font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.05em; text-transform: uppercase;
  transition: color 0.3s;
}

.step.active { color: var(--green-pale); }
.step.done { color: var(--green-bright); }

.step-num {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-family: 'Geist Mono', monospace; flex-shrink: 0;
}

.step.done .step-num { background: var(--green-bright); border-color: var(--green-bright); color: white; }
.step-arrow { color: rgba(255,255,255,0.2); font-size: 13px; padding: 0 2px; }

.webhook-status {
  display: flex; align-items: center; gap: 7px;
  font-size: 11px; color: rgba(255,255,255,0.5);
}

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #ef4444;
  transition: background 0.3s;
}

.status-dot.connected { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

.settings-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white; padding: 5px 13px; border-radius: 6px;
  font-size: 11px; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: background 0.2s;
}
.settings-btn:hover { background: rgba(255,255,255,0.18); }

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 290px 1fr;
  min-height: calc(100vh - 62px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  padding: 22px;
  display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto;
  height: calc(100vh - 62px);
  position: sticky; top: 62px;
}

.sidebar-section h3 {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); margin-bottom: 11px;
  padding-bottom: 7px; border-bottom: 1px solid var(--border);
}

.form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 11px; }
.form-group:last-child { margin-bottom: 0; }

label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.06em;
}

input, select, textarea {
  font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink);
  background: var(--green-ghost); border: 1.5px solid var(--border);
  border-radius: 7px; padding: 8px 11px; outline: none;
  transition: border-color 0.2s, background 0.2s; width: 100%; resize: vertical;
}
input:focus, select:focus, textarea:focus { border-color: var(--green-bright); background: white; }
textarea { min-height: 68px; }

.tone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

.tone-opt {
  padding: 7px 8px; border: 1.5px solid var(--border); border-radius: 6px;
  background: white; font-size: 11px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; text-align: center; color: var(--muted);
  font-family: 'DM Sans', sans-serif;
}
.tone-opt.active { background: var(--green-deep); border-color: var(--green-deep); color: white; }
.tone-opt:hover:not(.active) { border-color: var(--green-bright); color: var(--green-bright); }

.research-toggles { display: flex; flex-direction: column; gap: 7px; }

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; background: var(--green-ghost);
  border-radius: 7px; border: 1px solid var(--border);
}

.toggle-row span { font-size: 12px; font-weight: 500; color: var(--ink); }

.toggle {
  width: 34px; height: 19px; background: var(--border);
  border-radius: 10px; border: none; cursor: pointer;
  position: relative; transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: var(--green-bright); }
.toggle::after {
  content: ''; position: absolute;
  width: 13px; height: 13px; background: white;
  border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s;
}
.toggle.on::after { left: 18px; }

.run-btn {
  width: 100%; padding: 12px;
  background: var(--green-deep); color: white; border: none;
  border-radius: 9px; font-family: 'Instrument Serif', serif;
  font-size: 16px; font-style: italic; cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 9px;
}
.run-btn:hover { background: var(--green-mid); }
.run-btn:active { transform: scale(0.98); }
.run-btn:disabled { background: #9CA3AF; cursor: not-allowed; font-style: normal; font-size: 13px; }

/* ── CONTENT ── */
.content { padding: 26px 30px; overflow-y: auto; }

/* ── IDLE ── */
.idle-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 420px;
  gap: 14px; color: var(--muted); text-align: center;
}
.idle-icon { font-size: 52px; opacity: 0.22; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.idle-state h2 { font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--ink); opacity: 0.45; }
.idle-state p { font-size: 13px; max-width: 320px; line-height: 1.7; }

/* ── RESEARCH ── */
.research-phase { display: none; }

.phase-header { display: flex; align-items: center; gap: 13px; margin-bottom: 22px; }

.phase-badge {
  color: white; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 4px 11px; border-radius: 20px;
}
.phase-badge.green { background: var(--green-deep); }
.phase-badge.amber { background: var(--amber); }
.phase-badge.blue { background: var(--blue); }
.phase-badge.make { background: var(--make); }

.phase-header h2 { font-family: 'Instrument Serif', serif; font-size: 24px; color: var(--ink); }

.research-log {
  background: var(--ink); border-radius: 10px; padding: 18px;
  font-family: 'Geist Mono', monospace; font-size: 12px;
  color: #A3E635; line-height: 2.1; min-height: 130px;
  margin-bottom: 18px; overflow: hidden;
}

.log-line { opacity: 0; animation: fadeIn 0.3s forwards; }
.log-line.done { color: #86EFAC; }
.log-line.info { color: #93C5FD; }

@keyframes fadeIn { to { opacity: 1; } }

.research-findings {
  background: white; border: 1px solid var(--border);
  border-radius: 11px; padding: 18px; margin-bottom: 18px;
}
.research-findings h3 { font-family: 'Instrument Serif', serif; font-size: 17px; margin-bottom: 12px; }

.finding-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.finding-chip {
  background: var(--green-ghost); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 13px;
  font-size: 12px; color: var(--green-deep); font-weight: 500;
}

/* ── APPROVAL BOARD ── */
.approval-phase { display: none; }

.board-controls {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; flex-wrap: wrap;
}

.filter-btn {
  padding: 5px 13px; border-radius: 20px;
  border: 1.5px solid var(--border); background: white;
  font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: 'DM Sans', sans-serif; color: var(--muted);
  transition: all 0.15s;
}
.filter-btn.active { background: var(--green-deep); border-color: var(--green-deep); color: white; }

.approve-all-btn {
  margin-left: auto; padding: 7px 16px;
  background: var(--green-bright); color: white; border: none;
  border-radius: 7px; font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.2s; display: flex; align-items: center; gap: 6px;
}
.approve-all-btn:hover { background: var(--green-mid); }

/* Stats bar */
.stats-bar {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 18px;
}

.stat-pill {
  background: white; border: 1px solid var(--border);
  border-radius: 9px; padding: 11px 14px; text-align: center;
}

.stat-num { font-family: 'Instrument Serif', serif; font-size: 28px; color: var(--green-deep); line-height: 1; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
.stat-pill.approved-stat .stat-num { color: var(--green-bright); }
.stat-pill.rejected-stat .stat-num { color: var(--red); }
.stat-pill.pending-stat .stat-num { color: var(--amber); }

.posts-board {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* ── POST CARD ── */
.post-card {
  background: white; border: 2px solid var(--border);
  border-radius: 13px; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: flex; flex-direction: column;
}
.post-card.approved { border-color: var(--green-bright); box-shadow: 0 0 0 3px rgba(76,138,53,0.1); }
.post-card.rejected { border-color: var(--red); opacity: 0.5; }
.post-card.sent { border-color: var(--make); box-shadow: 0 0 0 3px rgba(109,0,204,0.08); }

.card-header {
  padding: 10px 13px; display: flex; align-items: center;
  gap: 9px; border-bottom: 1px solid var(--border);
  background: #FAFAF8;
}

.plat-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 5px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}
.plat-pill.fb { background: #E7F0FD; color: var(--fb); }
.plat-pill.ig { background: #FEE9F3; color: var(--ig); }
.plat-pill.li { background: #E8F0FA; color: var(--li); }
.plat-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.card-day { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

.card-status {
  margin-left: auto; font-size: 10px; font-weight: 700;
  padding: 3px 9px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em;
}
.card-status.pending { background: #F3F4F6; color: var(--muted); }
.card-status.approved { background: var(--green-pale); color: var(--green-deep); }
.card-status.rejected { background: var(--red-pale); color: var(--red); }
.card-status.sent { background: #EDE9FE; color: var(--make); }

.card-body { padding: 13px; flex: 1; display: flex; flex-direction: column; gap: 9px; }

.card-caption { font-size: 13px; line-height: 1.65; color: var(--ink); flex: 1; }

.caption-edit {
  font-size: 13px; line-height: 1.65; color: var(--ink);
  border: 1.5px solid var(--green-bright); border-radius: 7px;
  padding: 8px; background: var(--green-ghost);
  min-height: 100px; resize: vertical; display: none;
  width: 100%; font-family: 'DM Sans', sans-serif;
}

.card-meta { display: flex; flex-direction: column; gap: 4px; }
.meta-row { display: flex; gap: 6px; align-items: flex-start; font-size: 11px; color: var(--muted); }
.meta-key {
  font-weight: 700; color: var(--green-bright);
  text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em;
  padding-top: 1px; width: 36px; flex-shrink: 0;
}
.meta-tags { color: var(--green-mid); font-size: 11px; line-height: 1.5; word-break: break-word; }
.meta-time {
  background: var(--green-ghost); color: var(--green-deep);
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; width: fit-content;
}

.card-actions {
  display: flex; gap: 5px; padding: 9px 13px;
  border-top: 1px solid var(--border); background: #FAFAF8;
}

.action-btn {
  flex: 1; padding: 6px 0; border: 1.5px solid var(--border);
  border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 4px;
}
.action-btn.approve { background: var(--green-pale); border-color: var(--green-bright); color: var(--green-deep); }
.action-btn.approve:hover { background: var(--green-bright); color: white; }
.action-btn.reject { background: var(--red-pale); border-color: #FECACA; color: var(--red); }
.action-btn.reject:hover { background: var(--red); color: white; }
.action-btn.edit { background: var(--blue-pale); border-color: #BFDBFE; color: var(--blue); }
.action-btn.edit:hover { background: var(--blue); color: white; }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SEND BAR ── */
.send-bar {
  margin-top: 22px;
  background: white; border: 1px solid var(--border);
  border-radius: 13px; padding: 18px 22px;
  display: flex; align-items: center; gap: 16px;
}

.send-bar-info { flex: 1; }
.send-bar-info h3 { font-family: 'Instrument Serif', serif; font-size: 18px; color: var(--ink); margin-bottom: 3px; }
.send-bar-info p { font-size: 12px; color: var(--muted); }

.send-btn {
  padding: 11px 26px;
  background: var(--make); color: white; border: none;
  border-radius: 9px; font-family: 'Instrument Serif', serif;
  font-size: 16px; font-style: italic; cursor: pointer;
  transition: background 0.2s; white-space: nowrap;
  display: flex; align-items: center; gap: 9px;
}
.send-btn:hover { background: #5800aa; }
.send-btn:disabled { background: #9CA3AF; cursor: not-allowed; }

/* ── SENDING PHASE ── */
.sending-phase { display: none; }

.sending-log {
  background: var(--ink); border-radius: 11px; padding: 20px;
  font-family: 'Geist Mono', monospace; font-size: 12px;
  color: #A3E635; line-height: 2.2; margin-bottom: 20px;
}

.result-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px; margin-bottom: 20px;
}

.result-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}

.result-icon { font-size: 20px; flex-shrink: 0; }

.result-text { flex: 1; }
.result-plat { font-size: 12px; font-weight: 600; color: var(--ink); }
.result-day { font-size: 11px; color: var(--muted); margin-top: 1px; }

.result-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px;
  border-radius: 10px; text-transform: uppercase; letter-spacing: 0.04em;
}
.result-badge.queued { background: #EDE9FE; color: var(--make); }
.result-badge.failed { background: var(--red-pale); color: var(--red); }
.result-badge.sending { background: var(--amber-pale); color: var(--amber); }

.restart-btn {
  padding: 12px 24px;
  background: var(--green-deep); color: white; border: none;
  border-radius: 9px; font-family: 'Instrument Serif', serif;
  font-size: 16px; font-style: italic; cursor: pointer;
  transition: background 0.2s;
}
.restart-btn:hover { background: var(--green-mid); }

/* ── SETTINGS MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(15,26,10,0.6); z-index: 500;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: white; border-radius: 15px; padding: 30px;
  width: 460px; max-width: 92vw;
  box-shadow: 0 24px 80px rgba(0,0,0,0.2);
}

.modal h2 { font-family: 'Instrument Serif', serif; font-size: 22px; margin-bottom: 5px; }
.modal p { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }

.make-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #EDE9FE; color: var(--make);
  padding: 5px 12px; border-radius: 6px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 14px;
}

.webhook-preview {
  background: var(--ink); color: #A3E635;
  font-family: 'Geist Mono', monospace; font-size: 11px;
  padding: 10px 14px; border-radius: 7px; margin: 10px 0;
  word-break: break-all; line-height: 1.6;
}

.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; margin-bottom: 5px; }

.modal-actions { display: flex; gap: 9px; margin-top: 20px; }

.btn-primary {
  flex: 1; padding: 10px; background: var(--make); color: white;
  border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.btn-primary:hover { background: #5800aa; }

.btn-secondary {
  padding: 10px 18px; background: white; color: var(--muted);
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
}

.test-result {
  margin-top: 10px; pad
